<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EACOSH Poster Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#fff8f0; }

.header {
    background: linear-gradient(90deg,#d4af37,#198754);
    color:white;
    padding:15px;
}

.sidebar {
    height:100vh;
    overflow:auto;
    background:#fff;
    border-right:1px solid #ddd;
}

canvas {
    border:3px solid #d4af37;
    max-width:600px;
    width:100%;
    border-radius:12px;
    cursor:grab;
}
canvas:active {
    cursor:grabbing;
}
</style>
</head>

<body>

<div class="header d-flex justify-content-between">
<h5>INAUGURAL EACOSH CONFERENCE 2026</h5>
<button class="btn btn-dark" onclick="downloadPoster()">Download</button>
</div>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar p-3">

<h5>Editor</h5>

<p><strong>Posters Created:</strong> <span id="count">0</span></p>

<label>Full Name</label>
<input type="text" id="name" class="form-control mb-2">

<label>Title</label>
<input type="text" id="title" class="form-control mb-2">

<label>Font Size</label>
<input type="range" id="fontSize" min="20" max="80" value="50">

<label>Upload Photo</label>
<input type="file" id="upload" class="form-control mb-2">

<label>Photo Size</label>
<input type="range" id="circleSize" min="100" max="300" value="180">

<label>Zoom Image</label>
<input type="range" id="zoom" min="0.5" max="2" step="0.1" value="1">

</div>

<!-- CANVAS -->
<div class="col-md-9 d-flex justify-content-center align-items-center">
<canvas id="canvas" width="900" height="1200"></canvas>
</div>

</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

/* STATE */
let nameText = "Your Name";
let titleText = "Your Title";
let fontSize = 50;
let circleSize = 180;

let zoom = 1;

/* IMAGE */
let profileImg = new Image();
let imageLoaded = false;

/* BACKGROUND */
let bg = new Image();
bg.crossOrigin = "anonymous";
bg.src = "https://raw.githubusercontent.com/Nyiirotarsis/eacosh-poster-generator/main/poster-bg.jpg.jpeg";

/* POSITIONS */
let namePos = {x:450,y:800};
let titlePos = {x:450,y:860};
let imagePos = {x:450,y:500};

/* IMAGE DRAG OFFSET (inside circle) */
let imgOffset = {x:0, y:0};

/* DRAGGING */
let dragging = false;
let dragType = null;
let lastX = 0;
let lastY = 0;

/* DRAW */
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* BACKGROUND */
    if(bg.complete){
        ctx.drawImage(bg,0,0,canvas.width,canvas.height);
    }

    /* OVERLAY */
    ctx.fillStyle="rgba(255,255,255,0.6)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* IMAGE IN CIRCLE */
    if(imageLoaded){
        ctx.save();
        ctx.beginPath();
        ctx.arc(imagePos.x, imagePos.y, circleSize/2, 0, Math.PI*2);
        ctx.clip();

        let size = circleSize * zoom;

        ctx.drawImage(
            profileImg,
            imagePos.x - size/2 + imgOffset.x,
            imagePos.y - size/2 + imgOffset.y,
            size,
            size
        );

        ctx.restore();
    }

    /* NAME */
    ctx.textAlign="center";
    ctx.fillStyle="#000";
    ctx.font="bold "+fontSize+"px Arial";
    ctx.fillText(nameText, namePos.x, namePos.y);

    /* TITLE */
    ctx.fillStyle="#198754";
    ctx.font="italic 30px Arial";
    ctx.fillText(titleText, titlePos.x, titlePos.y);

    /* STATIC */
    ctx.fillStyle="#000";
    ctx.font="italic 24px Arial";
    ctx.fillText("I WILL BE",450,950);

    ctx.fillStyle="#198754";
    ctx.font="bold 34px Arial";
    ctx.fillText("ATTENDING",450,1000);

    ctx.fillStyle="#000";
    ctx.font="bold 22px Arial";
    ctx.fillText("EACOSH CONFERENCE 2026",450,1040);
}

/* INITIAL DRAW */
bg.onload = draw;
draw();

/* INPUT EVENTS */
document.getElementById("name").oninput = e=>{
    nameText = e.target.value || "Your Name";
    draw();
};

document.getElementById("title").oninput = e=>{
    titleText = e.target.value || "Your Title";
    draw();
};

document.getElementById("fontSize").oninput = e=>{
    fontSize = e.target.value;
    draw();
};

document.getElementById("circleSize").oninput = e=>{
    circleSize = e.target.value;
    draw();
};

document.getElementById("zoom").oninput = e=>{
    zoom = parseFloat(e.target.value);
    draw();
};

/* IMAGE UPLOAD (LOCAL ONLY) */
document.getElementById("upload").addEventListener("change", e=>{
    let file = e.target.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = ev=>{
        profileImg = new Image();
        profileImg.onload = ()=>{
            imageLoaded = true;
            imgOffset = {x:0, y:0}; // reset position
            draw();
        };
        profileImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
});

/* DRAG SYSTEM */
canvas.addEventListener("mousedown", e=>{
    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    lastX = x;
    lastY = y;

    dragType = null;

    if(Math.abs(x-namePos.x)<150 && Math.abs(y-namePos.y)<40){
        dragType = "name";
    }
    else if(Math.abs(x-titlePos.x)<150 && Math.abs(y-titlePos.y)<40){
        dragType = "title";
    }
    else if(Math.hypot(x-imagePos.x,y-imagePos.y)<circleSize/2){
        dragType = "image";
    }

    if(dragType) dragging = true;
});

canvas.addEventListener("mousemove", e=>{
    if(!dragging) return;

    let rect = canvas.getBoundingClientRect();
    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    let dx = x - lastX;
    let dy = y - lastY;

    if(dragType==="name"){
        namePos.x += dx;
        namePos.y += dy;
    }
    else if(dragType==="title"){
        titlePos.x += dx;
        titlePos.y += dy;
    }
    else if(dragType==="image"){
        imgOffset.x += dx;
        imgOffset.y += dy;
    }

    lastX = x;
    lastY = y;

    draw();
});

canvas.addEventListener("mouseup", ()=> dragging=false);
canvas.addEventListener("mouseleave", ()=> dragging=false);

/* DOWNLOAD */
let count=0;
function downloadPoster(){
    let link=document.createElement("a");
    link.download="poster.png";
    link.href=canvas.toDataURL("image/png");
    link.click();

    count++;
    document.getElementById("count").innerText=count;
}
</script>

</body>
</html>
