<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EACOSH 2026 Poster Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #fff8f0;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #d4af37, #198754);
    color: white;
    padding: 15px 20px;
}

/* SIDEBAR */
.sidebar {
    height: calc(100vh - 80px);
    overflow-y: auto;
    border-right: 1px solid #ddd;
    background: #fff;
}

/* CANVAS */
canvas {
    border: 3px solid #d4af37;
    width: 100%;
    max-width: 600px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

/* LABELS */
.tool-label {
    font-weight: 600;
    margin-top: 10px;
    color: #b36b00;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">INNUGURATION EACOSH CONFERENCE 2026</h5>
    <button class="btn btn-dark" onclick="downloadPoster()">Download Poster</button>
</div>

<div class="container-fluid">
<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3 sidebar p-3">

<h5>Editor Tools</h5>

<!-- COUNTER -->
<p class="mt-2">
<strong>Posters Created:</strong> <span id="count">0</span>
</p>

<!-- NAME -->
<label class="tool-label">Full Name</label>
<input type="text" id="name" class="form-control mb-3" placeholder="Enter full name">

<!-- TITLE -->
<label class="tool-label">Title / Designation</label>
<input type="text" id="title" class="form-control mb-3" placeholder="e.g. Engineer, Student, CEO">

<!-- FONT -->
<label class="tool-label">Font</label>
<select id="font" class="form-select mb-2">
<option>Arial</option>
<option>Georgia</option>
<option>Poppins</option>
<option>Courier New</option>
</select>

<!-- FONT SIZE -->
<label class="tool-label">Name Font Size</label>
<input type="range" id="fontSize" min="30" max="80" value="50" class="form-range">

<!-- IMAGE -->
<label class="tool-label">Upload Profile Photo</label>
<input type="file" id="upload" class="form-control mb-3">

<!-- CIRCLE SIZE -->
<label class="tool-label">Photo Size</label>
<input type="range" id="circleSize" min="100" max="300" value="180" class="form-range">

</div>

<!-- PREVIEW -->
<div class="col-md-9 d-flex flex-column align-items-center justify-content-center">

<h5 class="mt-3">Preview</h5>

<canvas id="canvas" width="900" height="1200"></canvas>

</div>

</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let profileImg = new Image();

let name = "";
let title = "";
let fontSize = 50;
let circleSize = 180;

let posterCount = 0;

/* DRAW POSTER */
function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* 🌈 BACKGROUND (GOLD + WHITE + GREEN) */
    let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, "#d4af37");   // gold
    gradient.addColorStop(0.4, "#ffffff"); // white
    gradient.addColorStop(1, "#198754");   // green

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    /* HEADER TEXT */
    ctx.fillStyle = "#fff";
    ctx.font = "bold 36px Arial";
    ctx.fillText("EACOSH CONFERENCE 2026", 180, 120);

    /* GREEN UNDERLINE */
    ctx.fillStyle = "#198754";
    ctx.fillRect(180, 140, 540, 6);

    /* PROFILE IMAGE */
    if (profileImg.src) {
        ctx.save();
        ctx.beginPath();
        ctx.arc(450, 500, circleSize / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(profileImg, 350, 400, circleSize, circleSize);
        ctx.restore();
    }

    /* NAME */
    ctx.fillStyle = "#000";
    ctx.font = "bold " + fontSize + "px " + document.getElementById("font").value;
    ctx.fillText(name, 300, 820);

    /* TITLE */
    ctx.fillStyle = "#198754";
    ctx.font = "italic 32px Arial";
    ctx.fillText(title, 300, 870);
}

/* IMAGE UPLOAD */
document.getElementById("upload").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        profileImg = new Image();
        profileImg.onload = draw;
        profileImg.src = event.target.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

/* NAME */
document.getElementById("name").addEventListener("input", function(e){
    name = e.target.value;
    draw();
});

/* TITLE */
document.getElementById("title").addEventListener("input", function(e){
    title = e.target.value;
    draw();
});

/* FONT SIZE */
document.getElementById("fontSize").addEventListener("input", function(e){
    fontSize = e.target.value;
    draw();
});

/* CIRCLE SIZE */
document.getElementById("circleSize").addEventListener("input", function(e){
    circleSize = e.target.value;
    draw();
});

/* DOWNLOAD + COUNTER */
function downloadPoster(){
    const link = document.createElement("a");
    link.download = "EACOSH-Poster.png";
    link.href = canvas.toDataURL();
    link.click();

    posterCount++;
    document.getElementById("count").innerText = posterCount;
}

/* INIT */
draw();
</script>

</body>
</html>
