<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EACOSH 2026 Poster Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #fff8f0; }

.header {
    background: linear-gradient(90deg, #d4af37, #198754);
    color: white;
    padding: 15px 20px;
}

.sidebar {
    height: calc(100vh - 80px);
    overflow-y: auto;
    border-right: 1px solid #ddd;
    background: #fff;
}

canvas {
    border: 3px solid #d4af37;
    width: 100%;
    max-width: 600px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.tool-label {
    font-weight: 600;
    margin-top: 10px;
    color: #b36b00;
}
</style>
</head>

<body>

<div class="header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">INAUGURAL EACOSH CONFERENCE 2026</h5>
    <button class="btn btn-dark" onclick="downloadPoster()">Download Poster</button>
</div>

<div class="container-fluid">
<div class="row">

<div class="col-md-3 sidebar p-3">

<h5>Editor Tools</h5>

<p><strong>Posters Created:</strong> <span id="count">0</span></p>

<label class="tool-label">Full Name</label>
<input type="text" id="name" class="form-control mb-3">

<label class="tool-label">Title / Designation</label>
<input type="text" id="title" class="form-control mb-3">

<label class="tool-label">Font</label>
<select id="font" class="form-select mb-2">
<option>Arial</option>
<option>Georgia</option>
<option>Poppins</option>
<option>Courier New</option>
</select>

<label class="tool-label">Name Font Size</label>
<input type="range" id="fontSize" min="30" max="80" value="50" class="form-range">

<label class="tool-label">Upload Profile Photo</label>
<input type="file" id="upload" class="form-control mb-3">

<label class="tool-label">Photo Size</label>
<input type="range" id="circleSize" min="100" max="300" value="180" class="form-range">

</div>

<div class="col-md-9 d-flex flex-column align-items-center justify-content-center">
<h5 class="mt-3">Preview</h5>
<canvas id="canvas" width="900" height="1200"></canvas>
</div>

</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let profileImg = new Image();
let bgImage = new Image();

/* ✅ IMPORTANT: correct file name */
bgImage.crossOrigin = "anonymous";
bgImage.src = "https://nyiirotarsis.github.io/eacosh-poster-generator/poster-bg.jpg.jpeg?v=" + new Date().getTime();

let name = "";
let title = "";
let fontSize = 50;
let circleSize = 180;
let posterCount = 0;

/* 🔥 DRAW FUNCTION */
function draw() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    /* 🖼 BACKGROUND (safe render) */
    if (bgImage.complete && bgImage.naturalWidth > 0) {
        ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
    } else {
        // fallback so nothing breaks
        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, "#d4af37");
        gradient.addColorStop(1, "#198754");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    /* 🔲 OVERLAY (improves readability) */
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    /* 👤 PROFILE IMAGE */
    if (profileImg.src && profileImg.complete) {
        let y = 500;

        ctx.save();
        ctx.beginPath();
        ctx.arc(canvas.width / 2, y, circleSize / 2, 0, Math.PI * 2);
        ctx.clip();
        ctx.drawImage(
            profileImg,
            (canvas.width/2)-(circleSize/2),
            y-(circleSize/2),
            circleSize,
            circleSize
        );
        ctx.restore();
    }

    /* 🧑 NAME */
    ctx.textAlign = "center";
    ctx.fillStyle = "#000";
    ctx.font = "bold " + fontSize + "px " + document.getElementById("font").value;
    ctx.fillText(name || "Your Name", canvas.width / 2, 780);

    /* 🧾 TITLE */
    ctx.fillStyle = "#198754";
    ctx.font = "italic 28px Arial";
    ctx.fillText(title || "Your Title", canvas.width / 2, 830);

    /* 🎤 ATTENDING */
    ctx.fillStyle = "#000";
    ctx.font = "italic 24px Arial";
    ctx.fillText("I WILL BE", canvas.width / 2, 900);

    ctx.fillStyle = "#198754";
    ctx.font = "bold 34px Arial";
    ctx.fillText("ATTENDING", canvas.width / 2, 950);

    ctx.fillStyle = "#000";
    ctx.font = "bold 22px Arial";
    ctx.fillText("EACOSH CONFERENCE 2026", canvas.width / 2, 1000);
}

/* 🚀 SAFE INITIAL LOAD */
draw(); // fallback immediately

bgImage.onload = function () {
    draw(); // redraw with image
};

bgImage.onerror = function () {
    console.log("❌ Background failed to load");
};

/* EVENTS */
document.getElementById("upload").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(event){
        profileImg = new Image();
        profileImg.onload = draw;
        profileImg.src = event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

document.getElementById("name").addEventListener("input", function(e){
    name = e.target.value;
    draw();
});

document.getElementById("title").addEventListener("input", function(e){
    title = e.target.value;
    draw();
});

document.getElementById("fontSize").addEventListener("input", function(e){
    fontSize = e.target.value;
    draw();
});

document.getElementById("circleSize").addEventListener("input", function(e){
    circleSize = e.target.value;
    draw();
});

/* DOWNLOAD */
function downloadPoster(){
    const link = document.createElement("a");
    link.download = "EACOSH-Poster.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

    posterCount++;
    document.getElementById("count").innerText = posterCount;
}
</script>

</body>
</html>
